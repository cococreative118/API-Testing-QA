name: API Automated Tests

# 什么时候触发这个流水线？
on:
  push:
    branches: [ "main" ] # 当有代码 push 到 main 分支时自动触发

# 具体怎么跑？
jobs:
  run-api-tests:
    runs-on: ubuntu-latest # 给你的流水线分配一台免费的云端 Linux 小服务器
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 消除 Node.js 20 弃用警告

    # 具体的执行步骤
    steps:
    # 步骤 1：把 GitHub 仓库里的最新代码抓取到这台小服务器上
    - name: 1. Checkout code
      uses: actions/checkout@v4

    # 步骤 2：给这台小服务器安装 Java 17 环境
    - name: 2. Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven # 缓存 maven 的依赖下载记录，让下次跑得更快！

    # 步骤 3：重头戏！敲入我们刚才本地敲过的命令，让它在云端全自动跑起来
    - name: 3. Run Tests with Maven
      run: mvn clean test

    # 步骤 4：生成供网页展示的 Allure 历史报告库
    - name: 4. Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always() # 保证哪怕前面测试挂了，报告照样生成
      id: allure-report
      with:
        allure_results: target/allure-results
        gh_pages: gh-pages # 指定一个特殊分支用来存网页
        allure_report: allure-report
        allure_history: allure-history # 保留之前的运行历史（超酷的特性！）

    # 步骤 5：把报告一键发布到免费服务器（GitHub Pages）！
    - name: 5. Deploy report to Github Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }} # 用你的账号自动授权
        publish_branch: gh-pages # 把网页代码发到这个特殊分支
        publish_dir: allure-history # 发送的内容是前面准备好的历史报告库
